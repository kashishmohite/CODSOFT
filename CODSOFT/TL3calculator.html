<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
  body { 
  display: flex; 
  justify-content: center; 
  align-items: center;
  height: 100vh; 
  background-color: #2c3e50;
 }
.calculator { 
    background: #fcfdfe; 
    padding: 20px; 
    border-radius: 15px; 
    width: 320px; 
    box-shadow: 0px 10px 20px rgba(240, 240, 240, 0.3); 
}

#display { 
    width: 94%; 
    height: 50px; 
    font-size: 24px; 
    text-align: right; 
    margin-bottom: 15px; 
    padding: 5px; 
    border-radius: 40px; 
    border: none; 
    background: #ecf0f1;
 }

.buttons { 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    gap: 10px;
    background-color: #effafa;
    border-radius: 73px;
    border: none;
 }
button { 
    padding: 20px; 
    font-size: 18px; 
    cursor: pointer; border: none; 
    border-radius: 120px; 
    background: #d4f0f0; 
    color: rgb(20, 15, 15); 
    transition: 0.2s;
    border-radius: 1rem;
    box-shadow: -5px -5px 12px 10px 10px 20px #271c1c(6, 3, 3) 
    rgba(0, 0, 0,rgba(240, 240, 240, 0.3) 16);
 }

button:hover { 
    background: #bdb6b6;   
}

.btn-equal {   
    background-color: #e67e22;
}
.btn-clear { 
    background-color: #e74c3c;
 }
.btn-zero { 
    background-color: #e67e22;
 }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button data-value="C" class="btn-clear">C</button>
            <button data-value="/">/</button>
            <button data-value="*">*</button>
            <button data-value="DEL">DEL</button>
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="-">-</button>
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="+">+</button>
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="=" class="btn-equal">=</button>
            <button data-value="0" class="btn-zero">0</button>
            <button data-value=".">.</button>
        </div>
    </div>
    <script src="scriptt3.js"></script>
</body>
</html>
